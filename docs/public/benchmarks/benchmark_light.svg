<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- Grid lines -->
  <line x1="190" y1="10" x2="190" y2="352" stroke="#ccd0da" stroke-width="1"/>
  <!-- 5m = 300s => (300/2100)*530 = 75.7 -->
  <line x1="265.7" y1="10" x2="265.7" y2="352" stroke="#ccd0da" stroke-width="0.5" stroke-dasharray="4,3"/>
  <!-- 10m = 600s => (600/2100)*530 = 151.4 -->
  <line x1="341.4" y1="10" x2="341.4" y2="352" stroke="#ccd0da" stroke-width="0.5" stroke-dasharray="4,3"/>
  <!-- 15m = 900s => (900/2100)*530 = 227.1 -->
  <line x1="417.1" y1="10" x2="417.1" y2="352" stroke="#ccd0da" stroke-width="0.5" stroke-dasharray="4,3"/>
  <!-- 20m = 1200s => (1200/2100)*530 = 302.9 -->
  <line x1="492.9" y1="10" x2="492.9" y2="352" stroke="#ccd0da" stroke-width="0.5" stroke-dasharray="4,3"/>
  <!-- 25m = 1500s => (1500/2100)*530 = 378.6 -->
  <line x1="568.6" y1="10" x2="568.6" y2="352" stroke="#ccd0da" stroke-width="0.5" stroke-dasharray="4,3"/>
  <!-- 30m = 1800s => (1800/2100)*530 = 454.3 -->
  <line x1="644.3" y1="10" x2="644.3" y2="352" stroke="#ccd0da" stroke-width="0.5" stroke-dasharray="4,3"/>
  <!-- 35m = 2100s => 720 -->
  <line x1="720" y1="10" x2="720" y2="352" stroke="#ccd0da" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- X-axis labels -->
  <text x="190" y="368" text-anchor="middle" fill="#6c6f85" font-size="11">0</text>
  <text x="265.7" y="368" text-anchor="middle" fill="#6c6f85" font-size="11">5m</text>
  <text x="341.4" y="368" text-anchor="middle" fill="#6c6f85" font-size="11">10m</text>
  <text x="417.1" y="368" text-anchor="middle" fill="#6c6f85" font-size="11">15m</text>
  <text x="492.9" y="368" text-anchor="middle" fill="#6c6f85" font-size="11">20m</text>
  <text x="568.6" y="368" text-anchor="middle" fill="#6c6f85" font-size="11">25m</text>
  <text x="644.3" y="368" text-anchor="middle" fill="#6c6f85" font-size="11">30m</text>
  <text x="720" y="368" text-anchor="middle" fill="#6c6f85" font-size="11">35m</text>

  <!-- Row 1: RustQC — 3m 56s = 236s => (236/2100)*530 = 59.6 -->
  <text x="178" y="30" text-anchor="end" fill="#4c4f69" font-size="12" font-weight="bold">RustQC (10 threads)</text>
  <rect x="190" y="18" width="59.6" height="24" rx="3" fill="#8839ef"/>
  <text x="255.6" y="34" text-anchor="start" fill="#4c4f69" font-size="11" font-weight="bold">3m 56s</text>

  <!-- Row 2: featureCounts — 3m 39s = 219s => (219/2100)*530 = 55.3 -->
  <text x="178" y="62" text-anchor="end" fill="#6c6f85" font-size="12">featureCounts</text>
  <rect x="190" y="50" width="55.3" height="24" rx="3" fill="#7c7f93"/>
  <text x="251.3" y="66" text-anchor="start" fill="#6c6f85" font-size="11">3m 39s</text>

  <!-- Row 3: dupRadar — 27m 21s = 1641s => (1641/2100)*530 = 414.1 -->
  <text x="178" y="94" text-anchor="end" fill="#6c6f85" font-size="12">dupRadar</text>
  <rect x="190" y="82" width="414.1" height="24" rx="3" fill="#7c7f93"/>
  <text x="610.1" y="98" text-anchor="start" fill="#6c6f85" font-size="11">27m 21s</text>

  <!-- Row 4: RSeQC: infer_experiment — 7s => (7/2100)*530 = 1.8 (min 4 for visibility) -->
  <text x="178" y="126" text-anchor="end" fill="#6c6f85" font-size="12">RSeQC: infer_experiment</text>
  <rect x="190" y="114" width="4" height="24" rx="3" fill="#7c7f93"/>
  <text x="200" y="130" text-anchor="start" fill="#6c6f85" font-size="11">7s</text>

  <!-- Row 5: RSeQC: inner_distance — 1m 09s = 69s => (69/2100)*530 = 17.4 -->
  <text x="178" y="158" text-anchor="end" fill="#6c6f85" font-size="12">RSeQC: inner_distance</text>
  <rect x="190" y="146" width="17.4" height="24" rx="3" fill="#7c7f93"/>
  <text x="213.4" y="162" text-anchor="start" fill="#6c6f85" font-size="11">1m 09s</text>

  <!-- Row 6: RSeQC: junction_annotation — 4m 37s = 277s => (277/2100)*530 = 69.9 -->
  <text x="178" y="190" text-anchor="end" fill="#6c6f85" font-size="12">RSeQC: junction_annotation</text>
  <rect x="190" y="178" width="69.9" height="24" rx="3" fill="#7c7f93"/>
  <text x="265.9" y="194" text-anchor="start" fill="#6c6f85" font-size="11">4m 37s</text>

  <!-- Row 7: RSeQC: read_distribution — 6m 00s = 360s => (360/2100)*530 = 90.9 -->
  <text x="178" y="222" text-anchor="end" fill="#6c6f85" font-size="12">RSeQC: read_distribution</text>
  <rect x="190" y="210" width="90.9" height="24" rx="3" fill="#7c7f93"/>
  <text x="286.9" y="226" text-anchor="start" fill="#6c6f85" font-size="11">6m 00s</text>

  <!-- Row 8: RSeQC: bam_stat — 6m 07s = 367s => (367/2100)*530 = 92.6 -->
  <text x="178" y="254" text-anchor="end" fill="#6c6f85" font-size="12">RSeQC: bam_stat</text>
  <rect x="190" y="242" width="92.6" height="24" rx="3" fill="#7c7f93"/>
  <text x="288.6" y="258" text-anchor="start" fill="#6c6f85" font-size="11">6m 07s</text>

  <!-- Row 9: RSeQC: junction_saturation — 6m 32s = 392s => (392/2100)*530 = 98.9 -->
  <text x="178" y="286" text-anchor="end" fill="#6c6f85" font-size="12">RSeQC: junction_saturation</text>
  <rect x="190" y="274" width="98.9" height="24" rx="3" fill="#7c7f93"/>
  <text x="294.9" y="290" text-anchor="start" fill="#6c6f85" font-size="11">6m 32s</text>

  <!-- Row 10: RSeQC: read_duplication — 29m 43s = 1783s => (1783/2100)*530 = 450 -->
  <text x="178" y="318" text-anchor="end" fill="#6c6f85" font-size="12">RSeQC: read_duplication</text>
  <rect x="190" y="306" width="450" height="24" rx="3" fill="#7c7f93"/>
  <text x="646" y="322" text-anchor="start" fill="#6c6f85" font-size="11">29m 43s</text>
</svg>
